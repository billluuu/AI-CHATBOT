<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Ai Chatbot </h1>

    </div>  

    </div>

    <script type="module" src="script.js"></script>
    
</body>
